# ────────────────────────────────────────────────────────
# mongo (from mongodb-values.yaml)
# ────────────────────────────────────────────────────────
mongo:
  architecture: replicaset
  replicaCount: 3
  auth:
    enabled: true
    existingSecret: mongodb-secret
    usernames:
      - auth_user
      - user_user
      - workout_user
      - nutrition_user
      - progress_user
    databases:
      - auth_db
      - user_db
      - workout_db
      - nutrition_db
      - progress_db
  replicaSetName: rs0
  persistence:
    enabled: true
    storageClass: mongo-nfs-storage
    accessModes:
      - ReadWriteOnce
    size: 5Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 500m
      memory: 1Gi
  arbiter:
    enabled: false
  metrics:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 128Mi
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9216"
        prometheus.io/path: "/metrics"
  podLabels:
    app.kubernetes.io/part-of: fitforge
    app.kubernetes.io/component: database
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9216"
    prometheus.io/path: "/metrics"

